services:
  - type: web
    name: e-hailing-safety-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter api build
    startCommand: pnpm --filter api start
    healthCheckPath: /api/health
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - apps/api/**
        - packages/shared/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: e-hailing-safety-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: e-hailing-safety-db
    databaseName: e_hailing_safety
    user: e_hailing_safety
    region: frankfurt
    plan: basic-256mb
    ipAllowList: []
